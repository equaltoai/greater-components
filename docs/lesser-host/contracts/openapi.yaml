openapi: 3.1.0
info:
  title: lesser-host REST API (contracts)
  version: 0.1.0
  description: |
    Contract snapshot for build-time client generation. This file is not served at runtime.

components:
  parameters:
    SoulMailboxAgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
        pattern: "^0x[0-9a-fA-F]{64}$"
    SoulMailboxDeliveryId:
      name: deliveryId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    SoulMailboxMessageRef:
      name: messageRef
      in: path
      required: true
      description: Opaque stable body-facing mailbox reference. In v1 this is backed by deliveryId; legacy messageId values are accepted only when unambiguous for the authenticated instance and agent.
      schema:
        type: string
        minLength: 1
        maxLength: 128

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimited:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  securitySchemes:
    sessionAuth:
      type: http
      scheme: bearer
      description: "Control plane session token: `Authorization: Bearer <session_token>`."
    instanceKeyAuth:
      type: http
      scheme: bearer
      description: "Managed instance API key: `Authorization: Bearer <instance_key>`. Host stores and matches only `sha256(raw_key)`; raw keys are returned only at creation time and never by read endpoints."

  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
              minLength: 1
              maxLength: 128
            message:
              type: string
              minLength: 1
              maxLength: 2048
            status_code:
              type: integer
              minimum: 400
              maximum: 599
            details:
              type: object
              additionalProperties: true
              description: Client-safe metadata for validation or state conflicts. Secrets, raw bearer tokens, and private signing material never appear here.
              properties:
                reason:
                  type: string
                  minLength: 1
                  maxLength: 128
                conversation_status:
                  type: string
                  enum: [unknown, pending, created, in_progress, assistant_turn_ready, declaration_extraction_pending, declaration_ready, completed, failed]
                expected_status:
                  type: string
                  minLength: 1
                  maxLength: 128
                produced_declarations_present:
                  type: boolean
                produced_declarations_valid:
                  type: boolean
            request_id:
              type: string
              minLength: 1
              maxLength: 128

    SoulAgentChannelsResponse:
      type: object
      additionalProperties: false
      required: [agentId, channels, contactPreferences, updatedAt]
      properties:
        agentId:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        channels:
          type: object
          additionalProperties: false
          required: [ens, email, phone]
          properties:
            ens:
              type: [object, "null"]
              additionalProperties: false
              required: [name]
              properties:
                name:
                  type: string
                  pattern: "^[a-z0-9][a-z0-9_.-]*\\.eth$"
                resolverAddress:
                  type: string
                  pattern: "^0x[0-9a-fA-F]{40}$"
                chain:
                  type: string
                  default: mainnet
            email:
              type: [object, "null"]
              additionalProperties: false
              required: [address, capabilities, verified]
              properties:
                address:
                  type: string
                  format: email
                  description: >
                    Current managed lessersoul.ai channels are derived as
                    <agent-local-id>.<instance-slug>@lessersoul.ai. Legacy bare
                    <agent-local-id>@lessersoul.ai addresses are inbound aliases
                    for migrated agents only and are not current public channels.
                capabilities:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [receive, send]
                protocols:
                  type: array
                  items:
                    type: string
                    enum: [smtp, imap]
                verified:
                  type: boolean
                verifiedAt:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [active, paused, decommissioned]
            phone:
              type: [object, "null"]
              additionalProperties: false
              required: [number, capabilities, verified]
              properties:
                number:
                  type: string
                  pattern: "^\\+[1-9]\\d{1,14}$"
                capabilities:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [sms-receive, sms-send, voice-receive, voice-send]
                provider:
                  type: string
                verified:
                  type: boolean
                verifiedAt:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [active, paused, decommissioned]
        contactPreferences:
          type: [object, "null"]
          additionalProperties: false
          required: [preferred, availability, responseExpectation, languages]
          properties:
            preferred:
              type: string
              enum: [email, sms, voice, activitypub, mcp]
            fallback:
              type: string
              enum: [email, sms, voice, activitypub, mcp]
            availability:
              type: object
              additionalProperties: false
              required: [schedule]
              properties:
                schedule:
                  type: string
                  enum: [always, business-hours, custom]
                timezone:
                  type: string
                windows:
                  type: [array, "null"]
                  items:
                    type: object
                    additionalProperties: false
                    required: [days, startTime, endTime]
                    properties:
                      days:
                        type: array
                        minItems: 1
                        items:
                          type: string
                          enum: [mon, tue, wed, thu, fri, sat, sun]
                      startTime:
                        type: string
                        pattern: "^[0-2][0-9]:[0-5][0-9]$"
                      endTime:
                        type: string
                        pattern: "^[0-2][0-9]:[0-5][0-9]$"
            responseExpectation:
              type: object
              additionalProperties: false
              required: [target, guarantee]
              properties:
                target:
                  type: string
                guarantee:
                  type: string
                  enum: [guaranteed, best-effort]
            rateLimits:
              type: object
              additionalProperties: false
              properties:
                email:
                  type: object
                  additionalProperties: false
                  properties:
                    maxInboundPerHour:
                      type: integer
                      minimum: 1
                    maxInboundPerDay:
                      type: integer
                      minimum: 1
                sms:
                  type: object
                  additionalProperties: false
                  properties:
                    maxInboundPerHour:
                      type: integer
                      minimum: 1
                    maxInboundPerDay:
                      type: integer
                      minimum: 1
                voice:
                  type: object
                  additionalProperties: false
                  properties:
                    maxConcurrentCalls:
                      type: integer
                      minimum: 1
                    maxCallsPerDay:
                      type: integer
                      minimum: 1
            languages:
              type: array
              minItems: 1
              items:
                type: string
                pattern: "^[a-z]{2}$"
            contentTypes:
              type: array
              items:
                type: string
            firstContact:
              type: object
              additionalProperties: false
              properties:
                requireSoul:
                  type: boolean
                  default: false
                requireReputation:
                  type: [number, "null"]
                  minimum: 0
                  maximum: 1
                introductionExpected:
                  type: boolean
                  default: false
        updatedAt:
          type: string
          format: date-time

    SoulAgentChannelPreferencesResponse:
      $ref: "../spec/v3/schemas/soul-agent-channel-preferences.response.schema.json"

    SoulAgentChannelPreferencesRequest:
      $ref: "../spec/v3/schemas/soul-agent-channel-preferences.request.schema.json"

    SoulAgentIdentity:
      $ref: "../spec/v3/schemas/soul-agent-identity.schema.json"

    SoulAnchorEvidence:
      type: object
      additionalProperties: false
      required: [kind]
      properties:
        kind:
          type: string
          enum: [host_registry_record, mint_transaction]
        tx_hash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        operation_id:
          type: string
          minLength: 1
          maxLength: 256
        token_id:
          type: string
          minLength: 1
          maxLength: 256
        chain_id:
          type: integer
          minimum: 1
        recorded_at:
          type: string
          format: date-time

    SoulAnchorAssurance:
      type: object
      additionalProperties: false
      required: [state, source, capability_gate, mutable, revocable]
      properties:
        state:
          type: string
          enum: [hosted_offchain, immutable_onchain]
        source:
          type: string
          enum: [host_record, onchain_receipt]
        capability_gate:
          type: boolean
          enum: [false]
        mutable:
          type: boolean
        revocable:
          type: boolean
        evidence:
          type: array
          maxItems: 8
          items:
            $ref: "#/components/schemas/SoulAnchorEvidence"

    SoulResolveResponse:
      type: object
      additionalProperties: false
      required: [version, agent]
      properties:
        version:
          type: string
          enum: ["1"]
        agent:
          $ref: "#/components/schemas/SoulAgentIdentity"

    SoulSearchResult:
      $ref: "../spec/v3/schemas/soul-search.result.schema.json"

    SoulSearchResponse:
      $ref: "../spec/v3/schemas/soul-search.response.schema.json"

    SoulCommSendRequest:
      $ref: "../spec/v3/schemas/soul-comm-send.request.schema.json"

    SoulCommSendResponse:
      $ref: "../spec/v3/schemas/soul-comm-send.response.schema.json"

    SoulCommSendErrorEnvelope:
      $ref: "../spec/v3/schemas/soul-comm-send.error.schema.json"

    SoulCommStatusResponse:
      $ref: "../spec/v3/schemas/soul-comm-status.response.schema.json"

    SoulCommStatusErrorEnvelope:
      $ref: "../spec/v3/schemas/soul-comm-status.error.schema.json"

    SoulCommContactabilityResponse:
      $ref: "../spec/v3/schemas/soul-comm-contactability.response.schema.json"

    SoulX402InvocationGrant:
      $ref: "../spec/v3/schemas/soul-x402-invocation-grant.schema.json"

    SoulX402InvocationGrantIssueRequest:
      $ref: "../spec/v3/schemas/soul-x402-invocation-grant.issue.request.schema.json"

    SoulX402InvocationGrantIssueResponse:
      $ref: "../spec/v3/schemas/soul-x402-invocation-grant.issue.response.schema.json"

    SoulX402InvocationGrantConsumeRequest:
      $ref: "../spec/v3/schemas/soul-x402-invocation-grant.consume.request.schema.json"

    SoulX402InvocationGrantConsumeResponse:
      $ref: "../spec/v3/schemas/soul-x402-invocation-grant.consume.response.schema.json"

    SoulCommMailboxMessage:
      $ref: "../spec/v3/schemas/soul-comm-mailbox-message.schema.json"

    SoulCommMailboxListResponse:
      $ref: "../spec/v3/schemas/soul-comm-mailbox-list.response.schema.json"

    SoulCommMailboxGetResponse:
      $ref: "../spec/v3/schemas/soul-comm-mailbox-get.response.schema.json"

    SoulCommMailboxContentResponse:
      $ref: "../spec/v3/schemas/soul-comm-mailbox-content.response.schema.json"

    SoulCommMailboxReplyRequest:
      $ref: "../spec/v3/schemas/soul-comm-mailbox-reply.request.schema.json"

    SoulAgentCommActivityItem:
      $ref: "../spec/v3/schemas/soul-agent-comm-activity-item.schema.json"

    SoulAgentCommActivityResponse:
      $ref: "../spec/v3/schemas/soul-agent-comm-activity.response.schema.json"

    SoulAgentCommQueueItem:
      $ref: "../spec/v3/schemas/soul-agent-comm-queue-item.schema.json"

    SoulAgentCommQueueResponse:
      $ref: "../spec/v3/schemas/soul-agent-comm-queue.response.schema.json"

    SafeTxPayload:
      type: object
      additionalProperties: false
      required: [safe_address, to, value, data]
      properties:
        safe_address:
          type: string
        to:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        value:
          type: string
        data:
          type: string
          pattern: "^0x[0-9a-fA-F]*$"

    SoulOperation:
      type: object
      additionalProperties: false
      required: [operation_id, kind, status, created_at, updated_at]
      properties:
        operation_id:
          type: string
        kind:
          type: string
        agent_id:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        status:
          type: string
          enum: [pending, proposed, executed, failed]
        safe_payload:
          type: string
        exec_tx_hash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        exec_block_number:
          type: integer
        exec_success:
          type: boolean
        receipt_json:
          type: string
        snapshot_json:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        executed_at:
          type: string
          format: date-time

    WalletChallengeResponse:
      type: object
      additionalProperties: false
      required: [id, address, chainId, nonce, message, issuedAt, expiresAt]
      properties:
        id:
          type: string
        username:
          type: string
        address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        chainId:
          type: integer
        nonce:
          type: string
        message:
          type: string
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    SoulRegistryProofInstructions:
      type: object
      additionalProperties: false
      required: [method]
      properties:
        method:
          type: string
          enum: [dns_txt, https_well_known]
        dns_name:
          type: string
        dns_value:
          type: string
        https_url:
          type: string
          format: uri
        https_body:
          type: string

    SoulAgentRegistration:
      type: object
      additionalProperties: false
      required: [id, domain_normalized, local_id, agent_id, status, created_at, updated_at]
      properties:
        id:
          type: string
        username:
          type: string
        domain_raw:
          type: string
        domain_normalized:
          type: string
        local_id_raw:
          type: string
        local_id:
          type: string
        agent_id:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        wallet_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        authority_model:
          type: string
          enum: [wallet_principal, instance_trust]
        capabilities:
          type: array
          items:
            type: string
        wallet_nonce:
          type: string
        wallet_message:
          type: string
        proof_token:
          type: string
        dns_verified:
          type: boolean
        https_verified:
          type: boolean
        wallet_verified:
          type: boolean
        verified_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, completed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    SoulAgentPromotionPrerequisites:
      type: object
      additionalProperties: false
      required:
        - principal_declaration_recorded
        - mint_operation_created
        - mint_executed
        - conversation_started
        - conversation_completed
        - review_draft_ready
        - ready_for_finalize
        - graduated
      properties:
        principal_declaration_recorded:
          type: boolean
        mint_operation_created:
          type: boolean
        mint_executed:
          type: boolean
        conversation_started:
          type: boolean
        conversation_completed:
          type: boolean
        review_draft_ready:
          type: boolean
        ready_for_finalize:
          type: boolean
        graduated:
          type: boolean

    SoulAgentPromotion:
      type: object
      additionalProperties: false
      required:
        - agent_id
        - domain
        - local_id
        - stage
        - request_status
        - review_status
        - approval_status
        - readiness_status
        - created_at
        - updated_at
        - prerequisites
      properties:
        agent_id:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        registration_id:
          type: string
        requested_by:
          type: string
        domain:
          type: string
        local_id:
          type: string
        wallet:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        authority_model:
          type: string
          enum: [wallet_principal, instance_trust]
        stage:
          type: string
          enum: [requested, approved, minted, reviewing, ready_to_finalize, graduated]
        request_status:
          type: string
          enum: [requested, verified, minted, graduated]
        review_status:
          type: string
          enum: [not_started, conversation_in_progress, draft_ready, published]
        approval_status:
          type: string
          enum: [pending, approved]
        readiness_status:
          type: string
          enum: [awaiting_verification, awaiting_mint, ready_for_conversation, ready_for_finalize, graduated]
        mint_operation_id:
          type: string
        mint_operation_status:
          type: string
          enum: [pending, proposed, executed, failed]
        anchor_state:
          type: string
          enum: [hosted_offchain, immutable_onchain]
        onchain_binding_status:
          type: string
          enum: [unavailable, pending, proposed, executed, failed]
        onchain_binding_available:
          type: boolean
        hosted_offchain_finalizable:
          type: boolean
        principal_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        latest_conversation_id:
          type: string
        latest_conversation_status:
          type: string
          enum: [created, in_progress, assistant_turn_ready, declaration_extraction_pending, declaration_ready, completed, failed]
        latest_review_sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        latest_boundary_count:
          type: integer
          minimum: 0
        latest_capability_count:
          type: integer
          minimum: 0
        published_version:
          type: integer
          minimum: 0
        requested_at:
          type: string
          format: date-time
        verified_at:
          type: string
          format: date-time
        approved_at:
          type: string
          format: date-time
        minted_at:
          type: string
          format: date-time
        review_started_at:
          type: string
          format: date-time
        review_ready_at:
          type: string
          format: date-time
        graduated_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        prerequisites:
          $ref: "#/components/schemas/SoulAgentPromotionPrerequisites"
        next_actions:
          type: array
          items:
            type: string
            enum:
              - verify_request
              - record_mint_execution
              - start_review_conversation
              - complete_review_conversation
              - begin_finalize

    SoulAgentPromotionResponse:
      type: object
      additionalProperties: false
      required: [version, promotion]
      properties:
        version:
          type: string
          enum: ["1"]
        promotion:
          $ref: "#/components/schemas/SoulAgentPromotion"

    SoulAgentPromotionListResponse:
      type: object
      additionalProperties: false
      required: [version, promotions, count, has_more]
      properties:
        version:
          type: string
          enum: ["1"]
        promotions:
          type: array
          items:
            $ref: "#/components/schemas/SoulAgentPromotion"
        count:
          type: integer
          minimum: 0
        has_more:
          type: boolean
        next_cursor:
          type: string

    SoulAgentPromotionLifecycleEvent:
      type: object
      additionalProperties: false
      required: [event_id, event_type, occurred_at, promotion]
      properties:
        event_id:
          type: string
        event_type:
          type: string
          enum:
            - request_created
            - request_approved
            - mint_executed
            - review_started
            - finalize_ready
            - graduated
        summary:
          type: string
        occurred_at:
          type: string
          format: date-time
        request_id:
          type: string
        operation_id:
          type: string
        conversation_id:
          type: string
        anchor_assurance:
          $ref: "#/components/schemas/SoulAnchorAssurance"
        promotion:
          $ref: "#/components/schemas/SoulAgentPromotion"

    SoulAgentPromotionLifecycleEventListResponse:
      type: object
      additionalProperties: false
      required: [version, events, count, has_more]
      properties:
        version:
          type: string
          enum: ["1"]
        events:
          type: array
          items:
            $ref: "#/components/schemas/SoulAgentPromotionLifecycleEvent"
        count:
          type: integer
          minimum: 0
        has_more:
          type: boolean
        next_cursor:
          type: string

    SoulAgentRegistrationBeginRequest:
      type: object
      additionalProperties: false
      required: [domain, local_id]
      properties:
        domain:
          type: string
        local_id:
          type: string
        wallet_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
          description: Required for wallet_principal registrations; omitted for instance_trust registrations on the instance-key route.
        authority_model:
          type: string
          enum: [wallet_principal, instance_trust]
          description: Explicit authority model. session-auth routes allow wallet_principal only; instance-key routes may use instance_trust with no wallet.
        capabilities:
          type: array
          items:
            oneOf:
              - type: string
              - type: object
                additionalProperties: true

    SoulAgentRegistrationBeginResponse:
      type: object
      additionalProperties: false
      required: [registration, proofs]
      properties:
        registration:
          $ref: "#/components/schemas/SoulAgentRegistration"
        wallet:
          $ref: "#/components/schemas/WalletChallengeResponse"
        proofs:
          type: array
          items:
            $ref: "#/components/schemas/SoulRegistryProofInstructions"
        promotion:
          $ref: "#/components/schemas/SoulAgentPromotion"

    SoulAgentRegistrationPrincipalDeclarationPreflightRequest:
      type: object
      additionalProperties: false
      required:
        - principal_address
        - principal_declaration
        - declared_at
      properties:
        principal_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        principal_declaration:
          type: string
        declared_at:
          type: string
          format: date-time

    SoulAgentRegistrationPrincipalDeclarationPreflightResponse:
      type: object
      additionalProperties: false
      required:
        - version
        - principal_address
        - signer_address
        - signing_method
        - message_encoding
        - message_hex
        - digest_hex
        - canonical_json
        - declared_at
      properties:
        version:
          type: string
          enum: ["1"]
        principal_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        signer_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        signing_method:
          type: string
          enum: [eip191_personal_sign]
        message_encoding:
          type: string
          enum: [hex_bytes]
        message_hex:
          type: string
          description: 32-byte digest encoded as 0x-prefixed hex; sign these bytes with EIP-191 personal_sign.
          pattern: "^0x[0-9a-fA-F]{64}$"
        digest_hex:
          type: string
          description: Alias of message_hex for clients that name the signing bytes as a digest.
          pattern: "^0x[0-9a-fA-F]{64}$"
        canonical_json:
          type: string
          description: Host-owned JCS canonical JSON that produced digest_hex.
        declared_at:
          type: string
          format: date-time

    SoulAgentRegistrationVerifyRequest:
      type: object
      additionalProperties: false
      required:
        - signature
        - principal_address
        - principal_declaration
        - principal_signature
        - declared_at
      properties:
        signature:
          type: string
        principal_address:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        principal_declaration:
          type: string
        principal_signature:
          type: string
        declared_at:
          type: string
          format: date-time

    SoulAgentRegistrationVerifyResponse:
      type: object
      additionalProperties: false
      required: [registration, operation]
      properties:
        registration:
          $ref: "#/components/schemas/SoulAgentRegistration"
        operation:
          $ref: "#/components/schemas/SoulOperation"
        safe_tx:
          $ref: "#/components/schemas/SafeTxPayload"
        promotion:
          $ref: "#/components/schemas/SoulAgentPromotion"

    AIUsage:
      type: object
      additionalProperties: false
      properties:
        provider:
          type: string
        model:
          type: string
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
        duration_ms:
          type: integer
          minimum: 0
        tool_calls:
          type: integer
          minimum: 0

    SoulMintConversationSSEInput:
      type: object
      additionalProperties: false
      required: [message]
      properties:
        model:
          type: string
          minLength: 1
        conversation_id:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1

    SoulHostedGenesisMintConversationRequest:
      type: object
      additionalProperties: false
      required: [message]
      description: |
        JSON-authoritative Host ↔ Lesser request for creating or appending a hosted-genesis mint-conversation turn.
        `conversation_id` is supplied when Lesser is resuming or appending to a persisted Host conversation. The optional
        `idempotency_key` and `correlation_id` are client-safe cross-boundary identifiers; they must not contain raw Host
        credentials, browser bearer tokens, raw LLM transcripts, or tenant user content.
      properties:
        model:
          type: string
          minLength: 1
        conversation_id:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9._:-]{1,128}$"
        message:
          type: string
          minLength: 1
        idempotency_key:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[A-Za-z0-9._:-]{1,128}$"
        correlation_id:
          type: string
          minLength: 1
          maxLength: 128
        lesser_request_id:
          type: string
          minLength: 1
          maxLength: 128

    SoulHostedGenesisConversationResponse:
      $ref: "../spec/v3/schemas/hosted-genesis.conversation.response.schema.json"

    SoulMintConversation:
      type: object
      additionalProperties: false
      required:
        - agent_id
        - conversation_id
        - model
        - status
        - created_at
      properties:
        agent_id:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        conversation_id:
          type: string
        model:
          type: string
        messages:
          type: string
        produced_declarations:
          type: string
        status:
          type: string
          description: >
            Legacy raw Host record status. `completed` is retained for backward compatibility and maps to the
            durable hosted-genesis contract status `declaration_ready` only when valid produced declarations exist.
          enum: [created, in_progress, assistant_turn_ready, declaration_extraction_pending, declaration_ready, completed, failed]
        usage:
          $ref: "#/components/schemas/AIUsage"
        charged_credits:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    SoulMintConversationCompleteRequest:
      type: object
      additionalProperties: false
      properties:
        declarations:
          oneOf:
            - type: string
            - $ref: "#/components/schemas/SoulMintConversationDeclarationPreview"

    SoulAgentMintConversationsResponse:
      type: object
      additionalProperties: false
      required: [version, conversations, count]
      properties:
        version:
          type: string
          enum: ["1"]
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/SoulMintConversation"
        count:
          type: integer
          minimum: 0

    SoulInstanceMintConversationSummary:
      type: object
      additionalProperties: false
      required:
        - agent_id
        - conversation_id
        - status
        - created_at
      properties:
        agent_id:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        conversation_id:
          type: string
          minLength: 1
          maxLength: 128
        model:
          type: string
        status:
          type: string
          enum: [created, in_progress, assistant_turn_ready, declaration_extraction_pending, declaration_ready, completed, failed]
        usage:
          $ref: "#/components/schemas/AIUsage"
        charged_credits:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    SoulInstanceMintConversationsResponse:
      type: object
      additionalProperties: false
      required: [version, conversations, count, limit]
      properties:
        version:
          type: string
          enum: ["1"]
        conversations:
          type: array
          items:
            $ref: "#/components/schemas/SoulInstanceMintConversationSummary"
        count:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 50

    SoulInstanceMintConversationResponse:
      $ref: "../spec/v3/schemas/hosted-genesis.conversation.response.schema.json"

    SoulMintConversationInstanceReadErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - soul_mint.invalid_request
                - soul_mint.unauthorized
                - soul_mint.boundary_violation
                - soul_mint.not_found
                - soul_mint.conflict
                - soul_mint.rate_limited
                - soul_mint.response_too_large
                - soul_mint.internal
            message:
              type: string
              minLength: 1
              maxLength: 2048
            status_code:
              type: integer
              minimum: 400
              maximum: 599
            details:
              type: object
              additionalProperties: true
              description: Client-safe metadata for validation, tenant-boundary, rate-limit, or oversize failures.
              properties:
                boundary:
                  type: string
                  enum: [instance_domain]
                field:
                  type: string
                  enum: [agentId, conversationId, limit, body]
                reason:
                  type: string
                  enum:
                    - invalid_agent_id
                    - invalid_conversation_id
                    - invalid_limit
                    - request_body_present
                    - tenant_domain_mismatch
                    - domain_not_verified
                    - response_too_large
                retry_after_seconds:
                  type: integer
                  minimum: 1
            request_id:
              type: string
              minLength: 1
              maxLength: 128

    SoulInstanceBootstrapErrorEnvelope:
      $ref: "../spec/v3/schemas/soul-instance-bootstrap.error.schema.json"

    SoulMintConversationFinalizeBeginRequest:
      type: object
      additionalProperties: false
      properties:
        boundary_signatures:
          type: object
          additionalProperties:
            type: string
          description: Required for wallet_principal registrations; omitted for authority_model=instance_trust.

    SoulMintConversationDeclarationPreview:
      type: object
      additionalProperties: false
      required: [selfDescription, capabilities, boundaries, transparency]
      properties:
        selfDescription:
          type: object
          additionalProperties: true
        capabilities:
          type: array
          items:
            type: object
            additionalProperties: true
        boundaries:
          type: array
          items:
            type: object
            additionalProperties: true
        transparency:
          type: object
          additionalProperties: true

    SoulMintConversationFinalizeBoundaryRequirement:
      type: object
      additionalProperties: false
      required:
        - boundary_id
        - category
        - statement
        - signing_method
        - message_encoding
        - message
      properties:
        boundary_id:
          type: string
        category:
          type: string
        statement:
          type: string
        rationale:
          type: string
        supersedes:
          type: string
        signature_hex:
          type: string
        signer_wallet:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        signing_method:
          type: string
          enum: [eip191_personal_sign, instance_trust]
        message_encoding:
          type: string
          enum: [utf8, none]
        message:
          type: string
        digest_hex:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"

    SoulMintConversationFinalizeSigningInput:
      type: object
      additionalProperties: false
      required:
        - signer_wallet
        - signing_method
        - message_encoding
        - message_hex
        - digest_hex
        - canonical_json
      properties:
        signer_wallet:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
        signing_method:
          type: string
          enum: [eip191_personal_sign]
        message_encoding:
          type: string
          enum: [hex_bytes]
        message_hex:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        digest_hex:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        canonical_json:
          type: string

    SoulMintConversationFinalizeRequestTemplate:
      type: object
      additionalProperties: false
      required: [boundary_signatures, issued_at, expected_version]
      properties:
        boundary_signatures:
          type: object
          additionalProperties:
            type: string
        issued_at:
          type: string
          format: date-time
        expected_version:
          type: integer
          minimum: 0
        self_attestation:
          type: string

    SoulMintConversationFinalizeRequest:
      type: object
      additionalProperties: false
      properties:
        boundary_signatures:
          type: object
          additionalProperties:
            type: string
          description: Required for wallet_principal registrations; omitted for authority_model=instance_trust.
        issued_at:
          type: string
          format: date-time
        expected_version:
          type: integer
          minimum: 0
        self_attestation:
          type: string
          description: Required for wallet_principal registrations; omitted for authority_model=instance_trust.

    SoulMintConversationFinalizePreflightResponse:
      type: object
      additionalProperties: false
      required:
        - version
        - authority_model
        - anchor_state
        - issued_at
        - expected_version
        - next_version
        - declarations_preview
        - finalize_request_template
      properties:
        version:
          type: string
          enum: ["1"]
        authority_model:
          type: string
          enum: [wallet_principal, instance_trust]
        anchor_state:
          type: string
          enum: [hosted_offchain, immutable_onchain]
        digest_hex:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        issued_at:
          type: string
          format: date-time
        expected_version:
          type: integer
          minimum: 0
        next_version:
          type: integer
          minimum: 1
        declarations_preview:
          $ref: "#/components/schemas/SoulMintConversationDeclarationPreview"
        boundary_requirements:
          type: array
          items:
            $ref: "#/components/schemas/SoulMintConversationFinalizeBoundaryRequirement"
        self_attestation_signing:
          $ref: "#/components/schemas/SoulMintConversationFinalizeSigningInput"
        finalize_request_template:
          $ref: "#/components/schemas/SoulMintConversationFinalizeRequestTemplate"
        registration_preview:
          type: object
          additionalProperties: true

    SoulMintConversationFinalizeResponse:
      $ref: "../spec/v3/schemas/soul-instance-bootstrap.finalize.response.schema.json"

paths:
  /api/v1/soul/agents/{agentId}/channels:
    get:
      operationId: soulGetAgentChannels
      summary: Get authenticated agent reachability channels (v3)
      security:
        - sessionAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{64}$"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulAgentChannelsResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/soul/agents/{agentId}/channels/preferences:
    get:
      operationId: soulGetAgentChannelPreferences
      summary: Get authenticated agent contact preferences (v3)
      security:
        - sessionAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{64}$"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulAgentChannelPreferencesResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    put:
      operationId: soulUpdateAgentChannelPreferences
      summary: Update agent contact preferences (v3)
      security:
        - sessionAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{64}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoulAgentChannelPreferencesRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulAgentChannelPreferencesResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/soul/resolve/ens/{ensName}:
    get:
      operationId: soulResolveEns
      summary: Resolve an ENS name to a soul agent
      parameters:
        - name: ensName
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 255
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulResolveResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/soul/resolve/email/{emailAddress}:
    get:
      operationId: soulResolveEmail
      summary: Resolve an email address to an owned soul agent
      security:
        - sessionAuth: []
      parameters:
        - name: emailAddress
          in: path
          required: true
          schema:
            type: string
            format: email
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulResolveResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/soul/resolve/phone/{phoneNumber}:
    get:
      operationId: soulResolvePhone
      summary: Resolve an E.164 phone number to an owned soul agent
      security:
        - sessionAuth: []
      parameters:
        - name: phoneNumber
          in: path
          required: true
          schema:
            type: string
            pattern: "^\\+[1-9]\\d{1,14}$"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulResolveResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/soul/search:
    get:
      operationId: soulSearch
      summary: Search soul agents (including channel + ens filters)
      description: |
        Accepted lookup forms include domain-only queries (`q=example.com`), domain-qualified agent queries
        (`q=example.com/medic`), explicit domain plus local queries (`q=medic&domain=example.com`), and bare local
        queries such as `q=medic`, `q=@medic`, or `q=medic/` when the request host maps to a verified instance domain.

        The endpoint stays fail-closed for cross-domain ambiguity: it does not perform an unbounded local-ID scan, and
        requests where `q` and `domain` specify conflicting domains reject with `400`.
      parameters:
        - name: q
          in: query
          required: false
          description: |
            Domain-only, domain-qualified, or local query. Bare local queries require either `domain` or a request
            host that maps to a verified instance domain.
          schema:
            type: string
        - name: domain
          in: query
          required: false
          description: |
            Optional domain override for local queries. Stage-qualified domains stay exact for lookup and are not
            canonicalized to the base instance domain.
          schema:
            type: string
        - name: capability
          in: query
          required: false
          schema:
            type: string
        - name: boundary
          in: query
          required: false
          schema:
            type: string
        - name: ens
          in: query
          required: false
          schema:
            type: string
        - name: principal
          in: query
          required: false
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{40}$"
        - name: channel
          in: query
          required: false
          schema:
            type: string
            enum: [email, phone]
          explode: true
          style: form
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulSearchResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/soul/agents/register/begin:
    post:
      operationId: soulRegisterBegin
      summary: Begin a soul promotion request
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoulAgentRegistrationBeginRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulAgentRegistrationBeginResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/soul/agents/register/{id}/principal-declaration/preflight:
    post:
      operationId: soulRegisterPrincipalDeclarationPreflight
      summary: Build Host-owned principal declaration signing material
      description: |
        Returns the canonical JCS payload and 32-byte digest that the principal wallet must sign with EIP-191
        `personal_sign` before calling registration verify. Clients must sign `message_hex` as hex bytes; they
        should not reconstruct this digest locally.
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoulAgentRegistrationPrincipalDeclarationPreflightRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulAgentRegistrationPrincipalDeclarationPreflightResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/soul/agents/register/{id}/verify:
    post:
      operationId: soulRegisterVerify
      summary: Verify proofs and principal approval for a soul promotion request
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoulAgentRegistrationVerifyRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulAgentRegistrationVerifyResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/soul/agents/register/{id}/mint-conversation:
    post:
      operationId: soulStartMintConversationSSE
      summary: Start or continue a registration-scoped mint conversation over SSE
      description: |
        Streams the assistant response using `text/event-stream`.
        Canonical SSE event names and payload schemas are published in `docs/contracts/soul-mint-conversation-sse.json`.
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoulMintConversationSSEInput"
      responses:
        "200":
          description: SSE stream of mint-conversation events
          content:
            text/event-stream:
              schema:
                type: string
          x-sse-contract:
            file: "./soul-mint-conversation-sse.json"
            version: "1"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
