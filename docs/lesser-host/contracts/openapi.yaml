  /api/v1/soul/x402/grants:
    post:
      operationId: soulX402IssueInvocationGrant
      summary: Issue a scoped x402 invocation grant
      security:
        - instanceKeyAuth: []
      description: |
        Issues a host-side off-chain invocation grant for a configured public paid caller. The grant binds the
        `agentId`, `capability`, `tool`, `resource`, invocation `requestHash`, caller subject hash, payment evidence
        hash, amount/network metadata, nonce, idempotency key hash, expiry, max usage, and caller-access payment policy
        version.

        This instance-key authenticated route returns a raw `grantToken` only on the first successful issue. Idempotent replays return the
        same grant metadata with `tokenReturned=false`; callers must retain the original token. Host stores only hashes
        of caller subject, payment evidence, optional payment id, idempotency key, and grant token. Generic
        `x402.grant_unavailable` errors avoid exposing private soul state, private comm reachability, unresolved payment
        detail, wallet material, or tenant data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoulX402InvocationGrantIssueRequest"
      responses:
        "200":
          description: Grant issued or idempotently replayed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulX402InvocationGrantIssueResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/soul/x402/grants/{grantId}/consume:
    post:
      operationId: soulX402ConsumeInvocationGrant
      summary: Consume a scoped x402 invocation grant
      description: |
        Consumes a host-issued x402 invocation grant from an authenticated managed instance. The bearer token is the
        instance API key; public paid callers never receive principal/operator/session authority. The authenticated
        instance must own the agent domain, present the one-time raw grant token, and repeat the original
        agent/capability/tool/resource/request hash binding.

        Consumption writes a bounded usage slot keyed by the consume idempotency key hash. Repeating the same consume
        idempotency key with the same consume request hash is a replay and does not increment usage. Distinct consume
        idempotency keys cannot exceed `maxUsage`.
      security:
        - instanceKeyAuth: []
      parameters:
        - name: grantId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoulX402InvocationGrantConsumeRequest"
      responses:
        "200":
          description: Grant consumed or idempotently replayed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulX402InvocationGrantConsumeResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/soul/comm/send:
    post:
      operationId: soulCommSend
      summary: Send an outbound comm message
      description: |
        Sends a new outbound comm through host. Host always generates the outgoing `messageId`, `messageRef`, and
        `deliveryId`; callers must not use this endpoint to supply outbound message identity.

        `inReplyTo`, when present, is a reply/conversation boundary reference rather than an identity override. Host
        checks it against prior host/provider conversation state for every recipient and fails closed with HTTP 403
        `comm.boundary_violation` plus `error.details.field=inReplyTo` when the reference is invalid. Canonical mailbox
        replies should use `POST /api/v1/soul/comm/mailbox/{agentId}/messages/{messageRef}/reply`, which derives
        recipient, thread, and provider reply headers from host's mailbox state.
      security:
        - instanceKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoulCommSendRequest"
      responses:
