  /api/v1/soul/comm/mailbox/{agentId}/messages:
    get:
      operationId: soulCommMailboxList
      summary: List redacted canonical mailbox messages
      description: |
        Returns bounded metadata and previews only. Full message content is fetched explicitly from the content endpoint.
        Filters are evaluated within the authenticated instance + exact agent mailbox. `query` is bounded metadata/preview
        matching only; it is not full-body search and never scans across tenants or agents.

        `fields` may be used by MCP clients to request compact projected message objects. `hasMore` and `nextCursor`
        describe the filtered result set. If bounded server-side filtering stops before exhausting broad mailbox rows,
        `partialScan`, `scanHasMore`, and `scanCursor` expose that broad scan state separately so MCP callers do not treat
        broad mailbox pagination as matching SMS/voice pagination.
      security:
        - instanceKeyAuth: []
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            pattern: "^0x[0-9a-fA-F]{64}$"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 2048
        - name: includeDeleted
          in: query
          required: false
          schema:
            type: boolean
        - name: deleted
          in: query
          required: false
          schema:
            type: boolean
          description: When present, filters exactly by deleted state. `deleted=true` implies deleted rows may be returned.
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
          description: Set false to exclude archived messages. Omitted preserves legacy behavior and may include archived messages.
        - name: archived
          in: query
          required: false
          schema:
            type: boolean
          description: When present, filters exactly by archived state.
        - name: read
          in: query
          required: false
          schema:
            type: boolean
          description: When present, filters exactly by read state.
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
          description: Convenience alias for `read=false`.
        - name: channelType
          in: query
          required: false
          schema:
            type: string
            enum: [email, sms, voice]
        - name: direction
          in: query
          required: false
          schema:
            type: string
            enum: [inbound, outbound]
        - name: threadId
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 128
        - name: query
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 128
          description: Bounded metadata/preview match within the authenticated instance + exact agent mailbox.
        - name: fields
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 512
          description: |
            Comma-separated projection list for compact MCP responses. Supported fields are
            `messageRef`, `deliveryId`, `messageId`, `threadId`, `direction`, `channelType`, `provider`,
            `providerMessageId`, `status`, `from`, `to`, `subject`, `preview`, `content`, `state`, `createdAt`,
            `updatedAt`, and nested fields such as `content.available`, `state.read`, `from.address`, and `to.number`.
            When omitted, the legacy full metadata object is returned.
        - name: include_raw
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: |
            Defaults to false. Host mailbox list responses do not expose raw upstream provider payloads; when false,
            any future raw diagnostic payload is omitted unless explicitly requested and available.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoulCommMailboxListResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

