name: Release Promotion Rehearsal

on:
  pull_request:
    branches: [staging]
  push:
    branches: [staging]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rehearse:
    name: Rehearse staging promotion path
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Fetch release branches
        run: git fetch origin staging premain main --force

      - name: Rehearse PR promotion path
        if: github.event_name == 'pull_request'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ "${HEAD_REF}" == chore/release-topology-* || "${HEAD_REF}" == chore/backmerge-* ]]; then
            echo "Release-topology/backmerge PR: preserving candidate merge ancestry."
            node scripts/rehearse-release-promotion.js --candidate HEAD
          elif git merge-base --is-ancestor origin/premain HEAD && git merge-base --is-ancestor origin/main HEAD; then
            echo "Release-branch ancestry detected: preserving candidate merge ancestry."
            node scripts/rehearse-release-promotion.js --candidate HEAD
          else
            echo "Ordinary staging PR: simulating GitHub squash merge into staging."
            node scripts/rehearse-release-promotion.js --candidate HEAD --simulate-squash
          fi

      - name: Rehearse current staging promotion path
        if: github.event_name != 'pull_request'
        run: node scripts/rehearse-release-promotion.js --candidate HEAD
