name: Main Branch Guard

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Base branch for policy evaluation (e.g., main)'
        required: true
        type: string
      head_ref:
        description: 'Head branch for policy evaluation (must be staging for main)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  guard:
    name: Enforce promotion-only main
    runs-on: ubuntu-latest

    steps:
      - name: Require PR from staging
        run: |
          base_ref="${{ github.base_ref }}"
          if [[ -z "${base_ref}" ]]; then
            base_ref="${{ github.event.inputs.base_ref }}"
          fi

          head_ref="${{ github.head_ref }}"
          if [[ -z "${head_ref}" ]]; then
            head_ref="${{ github.event.inputs.head_ref }}"
          fi
          if [[ -z "${head_ref}" ]]; then
            head_ref="${{ github.ref_name }}"
          fi

          echo "Base: ${base_ref}"
          echo "Head: ${head_ref}"

          if [ "${base_ref}" != "main" ]; then
            echo "::error::This guard only authorizes PRs into main."
            exit 1
          fi

          if [ "${head_ref}" != "staging" ]; then
            echo "::error::main is promotion-only. Allowed source: staging."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Validate release versions
        run: node scripts/validate-release-versions.js
