name: Manual Release

on:
  push:
    tags:
      - 'greater-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (example: greater-v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    name: Publish immutable release assets
    # Prevent duplicate releases when a workflow_dispatch run creates + pushes a tag.
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create and push tag (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "workflow_dispatch releases must be run from the main branch (got '${GITHUB_REF_NAME}')" >&2
            exit 1
          fi
          if [[ ! "${RELEASE_VERSION}" =~ ^greater-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release version must match 'greater-vX.Y.Z' (example: greater-v1.2.3); got '${RELEASE_VERSION}'" >&2
            exit 1
          fi

          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${RELEASE_VERSION}" >/dev/null; then
            existing_sha="$(git rev-list -n 1 "${RELEASE_VERSION}")"
            if [[ "${existing_sha}" != "${GITHUB_SHA}" ]]; then
              echo "tag '${RELEASE_VERSION}' already exists at ${existing_sha}; refusing to retag ${GITHUB_SHA}" >&2
              exit 1
            fi
            echo "tag '${RELEASE_VERSION}' already exists at ${existing_sha}"
            exit 0
          fi

          git tag "${RELEASE_VERSION}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_VERSION}"

      - name: Assert release target is on main
        run: |
          set -euo pipefail

          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git fetch --tags --force origin "refs/tags/${RELEASE_VERSION}:refs/tags/${RELEASE_VERSION}" || git fetch --tags --force origin

          tagged_sha="$(git rev-list -n 1 "${RELEASE_VERSION}")"
          if ! git merge-base --is-ancestor "${tagged_sha}" origin/main; then
            echo "release tag '${RELEASE_VERSION}' points at ${tagged_sha}, which is not an ancestor of origin/main" >&2
            exit 1
          fi

          echo "release tag '${RELEASE_VERSION}' points at ${tagged_sha}, an ancestor of origin/main"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm audit:lockfile-integrity
          pnpm install --frozen-lockfile

      - name: Prepare release metadata from tag
        run: |
          set -euo pipefail
          release_version="${RELEASE_VERSION#greater-v}"
          echo "Preparing Greater release ${RELEASE_VERSION} (version ${release_version})"
          node scripts/prepare-github-release.js "${RELEASE_VERSION}"

      - name: Build CLI tarball and registry artifacts
        run: pnpm release:artifacts

      - name: Create draft release if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          if ! gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release create "${TAG_NAME}" --verify-tag --title "${TAG_NAME}" --generate-notes --draft
          fi

          is_draft="$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft')"
          if [[ "${is_draft}" != "true" ]]; then
            echo "::error::Release ${TAG_NAME} already exists and is published; immutable releases cannot be modified."
            exit 1
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          mapfile -t existing_assets < <(gh release view "${TAG_NAME}" --json assets --jq '.assets[].name' 2>/dev/null || true)

          shopt -s nullglob
          assets=(
            registry/index.json
            registry/latest.json
            artifacts/*
          )

          for asset_path in "${assets[@]}"; do
            asset_name="$(basename "${asset_path}")"
            if printf '%s\n' "${existing_assets[@]}" | grep -Fxq "${asset_name}"; then
              echo "::error::Release ${TAG_NAME} already has asset ${asset_name}; refusing to mutate an existing release asset."
              exit 1
            fi
          done

          gh release upload "${TAG_NAME}" "${assets[@]}"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          gh release edit "${TAG_NAME}" --draft=false
