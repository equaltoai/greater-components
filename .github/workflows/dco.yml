name: DCO Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Base branch to compare against for signoffs (e.g., premain or main)'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: DCO Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch pull request refs
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune origin \
            "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" \
            "+refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/pull/${{ github.event.pull_request.number }}/head"

      - name: DCO Check (pull_request)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: node scripts/check-dco.js --base "${BASE_REF}" --head "${HEAD_REF}"

      - name: DCO Check (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          BASE_REF: ${{ inputs.base_ref }}
        run: |
          set -euo pipefail

          if [[ -z "${BASE_REF}" ]]; then
            echo "::error::Missing required input: base_ref"
            exit 1
          fi

          git fetch origin "${BASE_REF}:${BASE_REF}" --force
          node scripts/check-dco.js --base "${BASE_REF}" --head HEAD
