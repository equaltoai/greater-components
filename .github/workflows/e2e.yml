name: E2E Tests

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version
        id: playwright-version
        working-directory: packages/testing
        run: |
          version="$(
            node -e "const { createRequire } = require('node:module'); const fromTesting = createRequire(process.cwd() + '/package.json'); process.stdout.write(fromTesting('@playwright/test/package.json').version);"
          )"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Playwright version: ${version}"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-${{ matrix.browser }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-

      - name: Prepare Playwright ${{ matrix.browser }}
        timeout-minutes: 10
        working-directory: packages/testing
        run: |
          if [ "${{ matrix.browser }}" = "chromium" ]; then
            if command -v google-chrome >/dev/null 2>&1; then
              google-chrome --version
              echo "PLAYWRIGHT_E2E_USE_SYSTEM_CHROME=true" >> "$GITHUB_ENV"
              pnpm exec playwright install-deps chromium
            else
              pnpm exec playwright install chromium --with-deps
            fi
          else
            pnpm exec playwright install firefox --with-deps
          fi

      - name: Build packages
        run: pnpm build

      - name: Validate packages
        run: pnpm validate:package

      - name: Run SSR Playwright tests
        working-directory: packages/testing
        run: pnpm exec playwright test --config=playwright.demo.config.ts --project=${{ matrix.browser }}

      - name: Run CSR Playwright tests
        working-directory: packages/testing
        run: pnpm exec playwright test --config=playwright.demo.csr.config.ts --project=csr-${{ matrix.browser }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: packages/testing/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-${{ matrix.browser }}
          path: packages/testing/test-results/
          retention-days: 7
